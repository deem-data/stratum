name: Build & Test (Rust + Python)

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'examples/**'
      - 'benchmarks/**'
      - '.gitignore'
      - 'LICENSE.txt'
    branches: [main, master]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'examples/**'
      - 'benchmarks/**'
      - '.gitignore'
      - 'LICENSE.txt'
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]  # macOS 14 = Apple Silicon
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            _rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('_rust/Cargo.lock') }}

      - name: Create virtual environment with uv
        run: uv venv

      - name: Install maturin
        run: uv pip install maturin

      - name: Run Rust tests
        working-directory: _rust
        run: cargo test --release

      - name: Build Rust extension
        shell: bash
        working-directory: _rust
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source ../.venv/Scripts/activate
          else
            source ../.venv/bin/activate
          fi
          maturin develop --release

      - name: Install project with test dependencies
        run: uv sync --extra test

      - name: Run Python tests with coverage
        shell: bash
        working-directory: stratum
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source ../.venv/Scripts/activate
          else
            source ../.venv/bin/activate
          fi
          pytest -v --cov=stratum --cov-report=term-missing --cov-report=xml tests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./stratum/coverage.xml
          flags: unittests
          name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false